name: FTP Deploy to Lolipop

# mainブランチへのpush時に自動実行
on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Lolipop via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # GitHub Secrets から読み込み（リポジトリ設定 > Secrets and variables > Actions で登録）
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # アップロード元（プロジェクトルート全体）
          local-dir: ./

          # サーバー上のアップロード先パス
          server-dir: /ikeyamaspring.jp/

          # .gitや.github自体はアップロード不要なので除外
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
